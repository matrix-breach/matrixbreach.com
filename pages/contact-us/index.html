            background-image: radial-gradient(#222222 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .glow-hover:hover {
            box-shadow: 0 0 15px rgba(23, 92, 255, 0.4);
        }

        .terminal-cursor::after {
            content: '_';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            from,
            to {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>

    <main class="flex-grow bg-grid-pattern relative">
        <!-- Hero Section -->
        <section class="max-w-[1280px] mx-auto px-6 pt-24 pb-12 text-center">
            <h1 class="font-headline-lg text-headline-lg text-white mb-4">
                Connect with the Breach
            </h1>
            <p class="font-code-md text-code-md text-secondary tracking-widest uppercase terminal-cursor">
                Questions, contributions, or system reports.
            </p>
        </section>
        <!-- Contact Form Canvas -->
        <section class="max-w-[1280px] mx-auto px-6 pb-24 flex justify-center">
            <div class="w-full max-w-2xl bg-[#111111] border border-[#222222] p-8 md:p-12 relative overflow-hidden">
                <!-- Abstract Code Decoration -->
                <div class="absolute top-0 right-0 p-4 opacity-5 pointer-events-none select-none font-code-md text-xs">
                    <pre>0x00A1: AUTH_INIT
0x00A2: SESSION_UP
0x00A3: ENCRYPT_TLS_1.3
                    </pre>
                </div>
                <form action="https://formspree.io/f/xzdozlwg" method="POST" class="space-y-8 relative z-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label
                                class="font-label-caps text-label-caps text-zinc-500 uppercase">Identification</label>
                            <input name="name" type="text" required
                                class="w-full bg-[#0A0A0A] border border-[#222222] px-4 py-3 text-white font-code-md focus:outline-none focus:border-[#175CFF] focus:ring-1 focus:ring-[#175CFF] transition-all"
                                placeholder="NAME / OPERATOR" />
                        </div>
                        <div class="space-y-2">
                            <label class="font-label-caps text-label-caps text-zinc-500 uppercase">Comm_Channel</label>
                            <input name="email" type="email" required
                                class="w-full bg-[#0A0A0A] border border-[#222222] px-4 py-3 text-white font-code-md focus:outline-none focus:border-[#175CFF] focus:ring-1 focus:ring-[#175CFF] transition-all"
                                placeholder="EMAIL@ENCRYPTED.SH" />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="font-label-caps text-label-caps text-zinc-500 uppercase">Priority_Subject</label>
                        <select name="subject"
                            class="w-full bg-[#0A0A0A] border border-[#222222] px-4 py-3 text-white font-code-md focus:outline-none focus:border-[#175CFF] appearance-none cursor-pointer">
                            <option>SYSTEM_REPORT</option>
                            <option>CONTRIBUTION_REQ</option>
                            <option>EXPLOIT_FEEDBACK</option>
                            <option>GENERAL_INQUIRY</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label
                            class="font-label-caps text-label-caps text-zinc-500 uppercase">Transmission_Payload</label>
                        <textarea name="message" required rows="6"
                            class="w-full bg-[#0A0A0A] border border-[#222222] px-4 py-3 text-white font-code-md focus:outline-none focus:border-[#175CFF] focus:ring-1 focus:ring-[#175CFF] transition-all resize-none"
                            placeholder="ENTER MESSAGE CONTENT..."></textarea>
                    </div>
                    <div class="pt-4">
                        <button
                            class="w-full bg-primary-container text-white py-4 font-headline-sm text-lg glow-hover transition-all duration-300 flex items-center justify-center gap-3 active:scale-[0.98]"
                            type="submit">
                            <span class="material-symbols-outlined" data-icon="send">send</span>
                            Send Transmission
                        </button>
                    </div>
                </form>
                <!-- Status Indicator Bar -->
                <div
                    class="mt-8 pt-6 border-t border-[#222222] flex justify-between items-center font-code-md text-[10px] text-zinc-600 uppercase tracking-widest">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-secondary rounded-full animate-pulse"></span>
                        Status: Secure Connection Verified
                    </div>
                    <div>LATENCY: 24MS</div>
                </div>
            </div>
        </section>
        <!-- Sidebar Decorative Elements -->
        <div class="fixed left-6 bottom-32 hidden xl:block">
            <div class="flex flex-col gap-6 text-zinc-700">
                <span class="material-symbols-outlined text-sm" data-icon="terminal">terminal</span>
                <span class="material-symbols-outlined text-sm" data-icon="security">security</span>
                <span class="material-symbols-outlined text-sm" data-icon="code">code</span>
            </div>
        </div>
